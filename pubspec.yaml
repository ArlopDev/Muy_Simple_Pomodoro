name: app_prob_pomodoro
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+4

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.5.1
  vibration: ^2.0.0
  flutter_native_splash: ^2.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: fuenteGeneral
      fonts:
        - asset: assets/fonts/FuenteGeneral.ttf
  assets:
    - assets/sounds/start.mp3
    - assets/sounds/finish.mp3
    - assets/sounds/tapBoton.mp3


flutter_native_splash:
  color: "#FAFDE8"
  android_12:
    color: "#FAFDE8"
